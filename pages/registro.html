<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrate</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/styles-login.css">
</head>

<body>

    <div class="grid-iniciar-sesion">

        <header class="a">
            <img class="logo-card" src="../images/LOGO ATERRIZARG.png" alt="Logo">
            <div class="logo">ATERRIZARG</div>
            <nav>
                <a href="../index.html">Inicio</a>
                <a href="./reservas.html">Mis Reservas</a>
                <a href="./ofertas.html">Ofertas</a>
                <a href="./perfil.html">Perfil</a>
                <a href="./contacto.html">Contacto</a>
                <a href="./login.html">Iniciar sesion</a>

            </nav>
        </header>

        <main class="main-iniciar-sesion">
            <h2>Registrate</h2>
            <form action="./perfil.html">

                <label for="correo">
                    <p>Ingrese su Correo</p>
                    <input id="correo" type="email" placeholder="Email" required>
                </label>
                <label for="nombre">
                    <p>Ingrese su nombre</p>
                    <input id="nombre" type="text" placeholder="Nombre completo" required>
                </label>
                <label for="apellido">
                    <p>Ingrese su apellido</p>
                    <input id="apellido" type="text" placeholder="Apellido" required>
                </label>
                <label for="contrasena">
                    <p>Ingrese su contraseña</p>
                    <input id="contrasena" type="password" placeholder="Contraseña" required>
                </label>
                <label for="contrasena-confirmar">
                    <p>Ingrésela nuevamente</p>
                    <input id="contrasena-confirmar" type="password" placeholder="Contraseña" required>
                </label>
                <button type="submit">Ingresar</button>
            </form>
            <p>¿Ya tenés cuenta? <a href="./login.html">Iniciá sesión</a></p>
        </main>
        <footer>
            <div>
  <p class="footerContacto">© 2026 ATERRIZARG. Todos los derechos reservados</p>
                <p class="footerContacto"><img class="icono" src="../images/envelope-open-solid.png" alt="Email"> Email: contacto@aterrizarg.com</p>
                <p class="footerContacto"><img class="icono" src="../images/phone-solid.png" alt="Teléfono"> Teléfono: +54 11 1234-5678</p>
                <p class="footerContacto"><img class="icono" src="../images/map-pin-solid.png" alt="Ubicación"> Buenos Aires, Argentina</p>
            </div>
        </footer>
    </div>

</body>

</html>
