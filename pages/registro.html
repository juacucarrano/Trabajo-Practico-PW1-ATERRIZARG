<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login ATERRIZARG</title>
    <link rel="stylesheet" href="../styles/styles.css">

<body>

    <body>
        <div class="grid-iniciar-sesion">

            <header class="a">
                <div class="logo">✈ ATERRIZARG</div>
            </header>

            <main class="main-iniciar-sesion">
                <h2>Registrate</h2>
                <form action="./perfil.html">

                    <label>
                        <p>Ingrese su Correo</p>
                        <input type="email" placeholder="Email" required>
                    </label>
                    <label>
                        <p>Ingrese su nombre</p>
                        <input type="text" placeholder="Nombre completo" required>
                    </label>
                    <label>
                        <p>Ingrese su apellido</p>
                        <input type="text" placeholder="Apellido" required>
                    </label>
                    <label>
                        <p>Ingrese su contraseña</p>
                        <input type="password" placeholder="Contraseña" required>
                    </label>
                    <label>
                        <p>Ingrésela nuevamente</p>
                        <input type="password" placeholder="Contraseña" required>
                    </label>
                    <button type="submit">Ingresar</button>
                </form>
                <p>¿Ya tenés cuenta? <a href="./login.html">Iniciá sesión</a></p>
            </main>
            <footer>
                <div>
                    <p class="footerContacto">© 2026 ATERRIZARG. Todos los derechos reservados</p>
                    <p class="footerContacto">📧 Email: contacto@aterrizarg.com</p>
                    <p class="footerContacto">📞 Teléfono: +54 11 1234-5678</p>
                    <p class="footerContacto">📍 Buenos Aires, Argentina</p>
                </div>
