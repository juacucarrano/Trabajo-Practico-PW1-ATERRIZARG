<form action="./perfil-medios-pago.html" id="form-medios-pago">
    <h2>Medios de pago</h2>
    <div class="contenedor-gral">
        <h3>Tarjetas de crédito</h3>
        <fieldset id="field-tarjeta" name="tarjeta">
            <div class="form-tarjeta">
                <p>Ingresá los datos de tus tarjetas de crédito.</p>
                <div class="oculto tarjetas-guardadas" id="div-tarjetas-guardadas">
                    <div class="oculto tarjeta-fila" id="tarjeta-fila-0"></div>
                    <div class="oculto tarjeta-fila" id="tarjeta-fila-1"></div>
                    <div class="oculto tarjeta-fila" id="tarjeta-fila-2"></div>
                </div>
                <details id="tarjetas-details">
                    <summary>Agregar tarjeta</summary>
                    <div class="contenedor-labels-grid">
                        <label class="label-tarjeta-1" for="nro-tarjeta">
                            <span>Número</span>
                            <div class="form-nro-tarjeta">
                                <input id="nro-tarjeta" type="tel" name="nro-tarjeta" class="input-tarj nro"
                                    placeholder="Ingrese los 16 dígitos de la tarjeta">
                            </div>
                        </label>
                        <label class="label-tarjeta-2" for="titular-tarjeta">
                            <span>Titular</span>
                            <div>
                                <input id="titular-tarjeta" type="text" name="titular-tarjeta"
                                    class="input-tarj titular" placeholder="Como figura en la tarjeta" required>
                            </div>
                        </label>
                        <label class="label-tarjeta-3" for="mes-vto">
                            <span>Vencimiento</span>
                            <div>
                                <select name="mes-vto" id="mes-vto" required>
                                    <option value="" disabled selected hidden>Mes</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                    <option value="11">11</option>
                                    <option value="12">12</option>
                                </select>
                                <select name="anio-vto" id="anio-vto" required>
                                    <option value="" disabled selected hidden>Año</option>
                                    <option value="2026">2026</option>
                                    <option value="2027">2027</option>
                                    <option value="2028">2028</option>
                                    <option value="2029">2029</option>
                                    <option value="2030">2030</option>
                                    <option value="2031">2031</option>
                                    <option value="2032">2032</option>
                                    <option value="2033">2033</option>
                                    <option value="2034">2034</option>
                                    <option value="2035">2035</option>
                                </select>
                            </div>
                        </label>
                        <label class="label-tarjeta-4" for="documento">
                            <span>Documento</span>
                            <div>
                                <input id="documento" type="tel" name="documento" class="input-tarj titular"
                                    placeholder="Número">
                            </div>
                        </label>
                        <label class="label-tarjeta-5" for="cvv">
                            <span>Código de seguridad (CVV)</span>
                            <div>
                                <input id="cvv" type="tel" name="cod-seguridad" class="input-tarj cvv"
                                    placeholder="***">
                            </div>
                        </label>
                        <div class="form-boton">
                            <button type="submit" name="save" id="datos-enviar">Guardar</button>
                        </div>

                    </div>
                </details>
            </div>
        </fieldset>
    </div>
</form>

<form action="./perfil-medios-pago.html" id="form-facturacion">
    <div class="contenedor-gral">
        <h3>Facturación</h3>
        <fieldset id="field-facturacion" name="facturacion">
            <p>Completá tus datos de facturación.</p>
            <details>
                <summary>Agregar o edita tus datos de facturación</summary>
                <div class="contenedor-labels-grid">
                    <label for="pais">
                        <span>País</span>
                        <div class="form-domicilio">
                            <select id="pais" name="pais">
                                <option value="" disabled selected hidden>Seleccione un país</option>
                                <option value="alemania">Alemania</option>
                                <option value="argentina">Argentina</option>
                                <option value="australia">Australia</option>
                                <option value="bolivia">Bolivia</option>
                                <option value="brasil">Brasil</option>
                                <option value="canada">Canadá</option>
                                <option value="chile">Chile</option>
                                <option value="colombia">Colombia</option>
                                <option value="cuba">Cuba</option>
                                <option value="espana">España</option>
                                <option value="estados-unidos">Estados Unidos</option>
                                <option value="francia">Francia</option>
                                <option value="italia">Italia</option>
                                <option value="japon">Japón</option>
                                <option value="mexico">México</option>
                                <option value="paraguay">Paraguay</option>
                                <option value="peru">Perú</option>
                                <option value="reino-unido">Reino Unido</option>
                                <option value="uruguay">Uruguay</option>
                                <option value="venezuela">Venezuela</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>
                    </label>
                    <label for="domicilio">
                        <span>Domicilio</span>
                        <div class="form-domicilio">
                            <input id="domicilio" type="text" name="domicilio" class="input-domicilio domicilio"
                                placeholder="Calle y número (Ej: Av. Mayo 123)">
                        </div>
                    </label>
                    <label for="localidad">
                        <span>Localidad</span>
                        <div class="form-localidad">
                            <input id="localidad" type="text" name="localidad" class="input-domicilio localidad"
                                placeholder="Ej: San Justo">
                        </div>
                    </label>
                    <label for="provincia">
                        <span>Provincia</span>
                        <div class="form-provincia">
                            <input id="provincia" type="text" name="provincia" class="input-domicilio provincia"
                                placeholder="Ej: Buenos Aires">
                        </div>
                    </label>
                    <label for="cod-postal">
                        <span>Código postal</span>
                        <div class="form-cod-postal">
                            <input id="cod-postal" type="text" name="cod-postal" class="input-domicilio cod-postal"
                                placeholder="Ej: 1704 o B0704" maxlength="10">
                        </div>
                    </label>
                    <div class="form-boton">
                        <button type="submit" name="save" id="datos-enviar">Guardar</button>
                    </div>
                </div>
            </details>
        </fieldset>
    </div>
</form>
<script src="perfil-medios-pago.js" type="module"></script>
