<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/styles-contacto.css">
</head>

<body>

    <div class="grid">

        <header class="a">
            <img class="logo-card" src="../images/LOGO ATERRIZARG.png" alt="Logo">
            <div class="logo">ATERRIZARG</div>
            <nav>
                <a href="../index.html">Inicio</a>
                <a href="./reservas.html">Mis reservas</a>
                <a href="./ofertas.html">Ofertas</a>
                <a href="./contacto.html" class="selected-nav">Contacto</a>
                <a href="./login.html">Iniciar sesion</a>

            </nav>
        </header>

        <main class="main-contacto">
            <h2>Contacto</h2>
            <form action="./contacto.html">
                <label for="nombre-apellido">
                    <p>Ingresá nombre y apellido</p>
                    <input id="nombre-apellido" type="text" placeholder="Ingresá tu nombre" required>
                </label>
                <label for="email-contacto">
                    <p>Email de contacto</p>
                    <input id="email-contacto" type="email" placeholder="Ingresá tu email" required>
                </label>
                <label for="asunto">
                    <p>Asunto</p>
                    <select name="asunto" id="asunto" required>
                        <option value="" selected hidden disabled>Elegí una opción</option>
                        <option value="daño-maletas">Demora en la entrega, daño de maletas o pérdida total</option>
                        <option value="vuelos">Cancelaciones, retrasos excesivos o pérdida de conexiones</option>
                        <option value="atencion-cliente">Quejas sobre el personal de check-in, seguridad o puertas de embarque</option>
                        <option value="infraestructura">Limpieza de baños, falta de asientos o problemas con el Wi-Fi/enchufes</option>
                        <option value="precios">Disconformidad con costos de estacionamiento o locales comerciales</option>
                        <option value="otro">Otro</option>
                    </select>
                </label>
                <label for="mensaje">
                    <p>Tu mensaje (opcional)</p>
                    <textarea id="mensaje"></textarea>
                </label>
                <button type="submit">Ingresar</button>
            </form>
            <p>¿No tenés cuenta? <a href="./registro.html">Registrate</a></p>
        </main>

        <footer>
            <div>
  <p class="footerContacto">© 2026 ATERRIZARG. Todos los derechos reservados</p>
                <p class="footerContacto"><img class="icono" src="../images/envelope-open-solid.png" alt="Email"> Email: contacto@aterrizarg.com</p>
                <p class="footerContacto"><img class="icono" src="../images/phone-solid.png" alt="Teléfono"> Teléfono: +54 11 1234-5678</p>
                <p class="footerContacto"><img class="icono" src="../images/map-pin-solid.png" alt="Ubicación"> Buenos Aires, Argentina</p>
            </div>
        </footer>

    </div>

</body>

</html>
