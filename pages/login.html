<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/styles-login.css">
</head>

<body>
    <div class="grid-iniciar-sesion">

        <header class="a">
            <img class="logo-card" src="../images/LOGO ATERRIZARG.png" alt="Logo">
            <div class="logo">ATERRIZARG</div>
            <nav>
                <a href="../index.html">Inicio</a>
                <a href="./reservas.html">Mis Reservas</a>
                <a href="./ofertas.html">Ofertas</a>
                <a href="./perfil.html">Perfil</a>
                <a href="./contacto.html">Contacto</a>

            </nav>
        </header>

        <main class="main-iniciar-sesion">
            <h2>Iniciar Sesión</h2>
            <form action="./perfil.html">

                <label for="email">
                    <p>Ingrese el email</p>
                    <input id="email" type="email" placeholder="Email">
                </label>
                <label for="contrasena">
                    <p>Ingrese la contraseña</p>
                    <input id="contrasena" type="password" placeholder="Contraseña">
                </label>
                <button type="submit">Ingresar</button>
            </form>
            <p>¿No tenés cuenta? <a href="./registro.html">Registrate</a></p>
        </main>
        <footer>
            <div>
                <p>© 2023 ATERRIZARG. Todos los derechos reservados.</p>
                <p>📧 contacto@aterrizarg.com</p>
                <p>📞 +54 11 1234-5678</p>
                <p>📍 Buenos Aires, Argentina</p>
            </div>
        </footer>
    </div>

</body>

</html>
