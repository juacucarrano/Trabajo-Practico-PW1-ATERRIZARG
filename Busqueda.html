<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

<div class="grid">

    <header class="a">
        <img class="logo-card" src="./images/LOGO ATERRIZARG.png" alt="Logo">
        <div class="logo">ATERRIZARG</div>
        <nav>
            <a href="./Busqueda.html">Busqueda</a>
            <a href="./pages/reservas.html">Mis Reservas</a>
            <a href="./pages/ofertas.html">Ofertas</a>
        </nav>
    </header>

    <main class="d">
        <h2>Buscar vuelos</h2>

        <form class="buscador" action="./index.html" method="post">

            <label>Origen</label>
            <input type="text" placeholder="Ej: Buenos Aires">

            <label>Destino</label>
            <input type="text" placeholder="Ej: Madrid">

            <label>Fecha de ida</label>
            <input type="date">

            <label>Fecha de vuelta</label>
            <input type="date">

            <label>Número de pasajeros</label>
            <input type="number" min="1" value="1">

            <label>Clase</label>
            <select>
                <option>Turista</option>
                <option>Ejecutiva</option>
                <option>Primera clase</option>
            </select>

            <button type="submit">Buscar</button>

        </form>
    </main>

    <footer>
        <div>
            <p>© 2023 ATERRIZARG. Todos los derechos reservados.</p>
            <p>📧 contacto@aterrizarg.com</p>
            <p>📞 +54 11 1234-5678</p>
        </div>
    </footer>

</div>

</body>
</html>
